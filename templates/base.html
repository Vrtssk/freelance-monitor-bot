<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Фриланс-монитор{% endblock %}</title>

  {# Tailwind (Play CDN) — configured for the cream / monospace design system #}
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            canvas: "#fdfcfc",
            ink: "#201d1d",
            "ink-deep": "#0f0000",
            charcoal: "#302c2c",
            body: "#424245",
            mute: "#646262",
            stone: "#6e6e73",
            ash: "#9a9898",
            "surface-soft": "#f8f7f7",
            "surface-card": "#f1eeee",
            "surface-dark": "#201d1d",
            hairline: "rgba(15,0,0,0.12)",
            "hairline-strong": "#646262",
            accent: "#007aff",
          },
          fontFamily: {
            mono: ["Berkeley Mono", "JetBrains Mono", "IBM Plex Mono",
                   "ui-monospace", "SFMono-Regular", "Menlo", "Monaco",
                   "Consolas", "monospace"],
          },
          borderRadius: { sm: "4px" },
        },
      },
    };
  </script>

  {# HTMX + Alpine.js for partial updates and local UI state #}
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    /* Single-font identity: everything is monospaced. */
    html { font-family: "Berkeley Mono", "JetBrains Mono", "IBM Plex Mono",
           ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    body { background: #fdfcfc; color: #201d1d; -webkit-font-smoothing: antialiased; }

    /* Legacy class names (kept for tests) restyled to the cream/mono brief:
       flat, hairline borders, 4px radius on interactive only, no shadows. */
    .navlink { color: #646262; padding: 9px 16px; border-radius: 4px;
              text-decoration: none; font-weight: 600; font-size: 14px;
              border: 1px solid transparent; }
    .navlink:hover { color: #201d1d; border-color: #646262; }
    .navlink.active { background: #201d1d; color: #fdfcfc; border-color: #201d1d; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 16px; }
    .card { background: #fdfcfc; border: 1px solid rgba(15,0,0,0.12); border-radius: 4px;
            padding: 16px; display: flex; flex-direction: column; gap: 10px;
            position: relative; transition: border-color .15s; }
    .card:hover { border-color: #201d1d; }
    .card .top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .src { font-size: 12px; color: #646262; font-weight: 600; }
    .src .em { margin-right: 5px; }
    .title { font-size: 16px; font-weight: 650; line-height: 1.3; margin: 0; }
    .title a { color: #201d1d; text-decoration: none; }
    .title a:hover { text-decoration: underline; }
    .meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; font-size: 13px; color: #646262; }
    .budget { color: #201d1d; font-weight: 700; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { background: #f1eeee; border: 1px solid rgba(15,0,0,0.12); color: #424245;
            font-size: 11.5px; padding: 3px 9px; border-radius: 4px; white-space: nowrap; }
    .desc { color: #646262; font-size: 13px; line-height: 1.45;
            display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    .date { font-size: 11.5px; color: #9a9898; margin-top: auto; }
    .badge { position: absolute; top: 12px; right: 12px; font-size: 10.5px; font-weight: 700;
             padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: .5px; }
    .badge.vac { background: #201d1d; color: #fdfcfc; border: 1px solid #201d1d; }
    .badge.notif { background: transparent; color: #201d1d; border: 1px solid #646262; }
    .badge.score { background: transparent; color: #201d1d; border: 1px solid #646262; }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin: 6px 0 18px; }
    .fbtn { background: #f8f7f7; border: 1px solid rgba(15,0,0,0.12); color: #646262;
            padding: 7px 13px; border-radius: 4px; cursor: pointer; font-size: 13px; transition: .15s; }
    .fbtn:hover { color: #201d1d; border-color: #201d1d; }
    .fbtn.active { background: #201d1d; color: #fdfcfc; border-color: #201d1d; font-weight: 600; }

    .empty { text-align: center; color: #646262; padding: 60px 0; font-size: 15px; }
    a:focus-visible, button:focus-visible { outline: 2px solid #201d1d; outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>
<body class="bg-canvas text-ink font-mono min-h-screen flex flex-col">

  <nav class="border-b border-hairline h-14 flex items-center justify-between px-5">
    <a href="/" class="font-bold tracking-tight text-ink no-underline">ФРИЛАНС&#8209;МОНИТОР</a>
    <div class="flex gap-1 text-sm">
      <a class="navlink {% if active == 'all' %}active{% endif %}" href="/">Все</a>
      <a class="navlink {% if active == 'top' %}active{% endif %}" href="/top">Топ-10 релевантных</a>
    </div>
  </nav>

  <main class="flex-1 w-full max-w-[960px] mx-auto px-5 py-10">
    {% block hero %}{% endblock %}
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-hairline px-5 py-6 text-xs text-mute text-center">
    freelance-monitor-bot · локальная доска объявлений
  </footer>

</body>
</html>
