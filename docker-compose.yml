services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: freelance
      POSTGRES_PASSWORD: freelance
      POSTGRES_DB: freelance_bot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freelance -d freelance_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    command: python run.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://freelance:freelance@db:5432/freelance_bot
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://freelance:freelance@db:5432/freelance_bot
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
